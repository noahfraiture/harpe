syntax = "proto3";

package harpe.v1;

service UserService {
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
}

service GameService {
  rpc CreateGame(CreateGameRequest) returns (Game);
  rpc ListGames(ListGamesRequest) returns (ListGamesResponse);
  rpc GetGame(GetGameRequest) returns (Game);
}

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc GetSession(GetSessionRequest) returns (Session);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc SendMessage(SendMessageRequest) returns (stream MessageDelta);
  rpc PreviewContext(PreviewContextRequest) returns (PreviewContextResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
}

service MemoryService {
  rpc GetStorySummary(GetStorySummaryRequest) returns (StorySummary);
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse);
  rpc GetCharacter(GetCharacterRequest) returns (Character);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc ListWorldFacts(ListWorldFactsRequest) returns (ListWorldFactsResponse);
  rpc ListLocations(ListLocationsRequest) returns (ListLocationsResponse);
  rpc SearchMemory(SearchMemoryRequest) returns (SearchMemoryResponse);
  rpc ExportGame(ExportGameRequest) returns (GameSnapshot);
}

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

service MetricsService {
  rpc GetMetrics(GetMetricsRequest) returns (MetricsSnapshot);
}

service AdminService {
  rpc ListBackgroundJobs(ListBackgroundJobsRequest) returns (ListBackgroundJobsResponse);
  rpc ListMemoryChunks(ListMemoryChunksRequest) returns (ListMemoryChunksResponse);
}

message User {
  string id = 1;
  string display_name = 2;
  string created_at = 3;
}

message Game {
  string id = 1;
  string title = 2;
  string system_prompt = 3;
  string created_at = 4;
  string owner_user_id = 5;
}

message Session {
  string id = 1;
  string game_id = 2;
  string title = 3;
  string created_at = 4;
}

message Message {
  string id = 1;
  string session_id = 2;
  MessageRole role = 3;
  string content = 4;
  string created_at = 5;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_SYSTEM = 1;
  MESSAGE_ROLE_USER = 2;
  MESSAGE_ROLE_ASSISTANT = 3;
}

message StorySummary {
  string session_id = 1;
  string content = 2;
  string updated_at = 3;
}

message Character {
  string id = 1;
  string game_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  string updated_at = 6;
}

message Event {
  string id = 1;
  string session_id = 2;
  string summary = 3;
  int32 importance = 4;
  string created_at = 5;
}

message WorldFact {
  string id = 1;
  string game_id = 2;
  string subject = 3;
  string predicate = 4;
  string object = 5;
  string content = 6;
  float confidence = 7;
  string updated_at = 8;
}

message Location {
  string id = 1;
  string game_id = 2;
  string name = 3;
  string description = 4;
  string updated_at = 5;
}

message MemoryHit {
  string id = 1;
  string session_id = 2;
  string kind = 3;
  string content = 4;
  float score = 5;
}

message MemoryChunk {
  string id = 1;
  string session_id = 2;
  string kind = 3;
  string content = 4;
  repeated float embedding = 5;
  string created_at = 6;
}

message GameSnapshot {
  Game game = 1;
  repeated Session sessions = 2;
  repeated StorySummary summaries = 3;
  repeated Character characters = 4;
  repeated Event events = 5;
  repeated WorldFact world_facts = 6;
  repeated Location locations = 7;
  repeated MemoryChunk memory_chunks = 8;
  string exported_at = 9;
}

message PageRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message PageInfo {
  string next_page_token = 1;
  uint32 returned_count = 2;
}

message CreateUserRequest {
  string display_name = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message CreateGameRequest {
  string title = 1;
  string system_prompt = 2;
  string owner_user_id = 3;
}

message ListGamesRequest {
  uint32 limit = 1;
  PageRequest page = 10;
}

message ListGamesResponse {
  repeated Game games = 1;
  PageInfo page = 10;
}

message GetGameRequest {
  string game_id = 1;
}

message CreateSessionRequest {
  string game_id = 1;
  string title = 2;
}

message GetSessionRequest {
  string session_id = 1;
}

message ListSessionsRequest {
  string game_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
  PageInfo page = 10;
}

message SendMessageRequest {
  string session_id = 1;
  string content = 2;
}

enum MessageFinishReason {
  MESSAGE_FINISH_REASON_UNSPECIFIED = 0;
  MESSAGE_FINISH_REASON_IN_PROGRESS = 1;
  MESSAGE_FINISH_REASON_ASSISTANT_COMPLETE = 2;
}

message MessageDelta {
  string session_id = 1;
  string message_id = 2;
  string delta = 3;
  bool done = 4;
  uint32 sequence = 5;
  MessageFinishReason finish_reason = 6;
}

message ListMessagesRequest {
  string session_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListMessagesResponse {
  repeated Message messages = 1;
  PageInfo page = 10;
}

message PreviewContextRequest {
  string session_id = 1;
  string content = 2;
}

message ContextMessage {
  MessageRole role = 1;
  string content = 2;
  uint32 estimated_tokens = 3;
}

message PreviewContextResponse {
  repeated ContextMessage messages = 1;
  uint32 estimated_tokens = 2;
}

message GetStorySummaryRequest {
  string session_id = 1;
}

message ListCharactersRequest {
  string game_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListCharactersResponse {
  repeated Character characters = 1;
  PageInfo page = 10;
}

message GetCharacterRequest {
  string character_id = 1;
}

message ListEventsRequest {
  string session_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListEventsResponse {
  repeated Event events = 1;
  PageInfo page = 10;
}

message ListWorldFactsRequest {
  string game_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListWorldFactsResponse {
  repeated WorldFact facts = 1;
  PageInfo page = 10;
}

message ListLocationsRequest {
  string game_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListLocationsResponse {
  repeated Location locations = 1;
  PageInfo page = 10;
}

message SearchMemoryRequest {
  string session_id = 1;
  string query = 2;
  uint32 limit = 3;
  PageRequest page = 10;
}

message SearchMemoryResponse {
  repeated MemoryHit hits = 1;
  PageInfo page = 10;
}

message ExportGameRequest {
  string game_id = 1;
}

message HealthCheckRequest {
  string service = 1;
}

enum ServingStatus {
  SERVING_STATUS_UNSPECIFIED = 0;
  SERVING_STATUS_SERVING = 1;
  SERVING_STATUS_DEGRADED = 2;
  SERVING_STATUS_NOT_SERVING = 3;
}

message HealthCheckResponse {
  ServingStatus status = 1;
  string service = 2;
  string version = 3;
  bool database_ok = 4;
  uint32 pending_jobs = 5;
  uint32 failed_jobs = 6;
  string checked_at = 7;
}

message GetMetricsRequest {}

message MetricsSnapshot {
  uint64 grpc_requests = 1;
  uint64 grpc_failures = 2;
  uint64 streamed_messages = 3;
  uint64 jobs_processed = 4;
  uint64 jobs_succeeded = 5;
  uint64 jobs_retried = 6;
  uint64 jobs_failed = 7;
  uint64 health_checks = 8;
  string collected_at = 9;
}

enum AdminJobKind {
  ADMIN_JOB_KIND_UNSPECIFIED = 0;
  ADMIN_JOB_KIND_UPDATE_MEMORY_AFTER_TURN = 1;
}

enum AdminJobStatus {
  ADMIN_JOB_STATUS_UNSPECIFIED = 0;
  ADMIN_JOB_STATUS_PENDING = 1;
  ADMIN_JOB_STATUS_RUNNING = 2;
  ADMIN_JOB_STATUS_SUCCEEDED = 3;
  ADMIN_JOB_STATUS_FAILED = 4;
}

message BackgroundJobDebug {
  string id = 1;
  AdminJobKind kind = 2;
  AdminJobStatus status = 3;
  string payload_json = 4;
  int32 attempts = 5;
  int32 max_attempts = 6;
  string last_error = 7;
  string run_after = 8;
  string created_at = 9;
  string updated_at = 10;
}

message ListBackgroundJobsRequest {
  AdminJobStatus status = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListBackgroundJobsResponse {
  repeated BackgroundJobDebug jobs = 1;
  PageInfo page = 10;
}

message ListMemoryChunksRequest {
  string session_id = 1;
  uint32 limit = 2;
  PageRequest page = 10;
}

message ListMemoryChunksResponse {
  repeated MemoryChunk chunks = 1;
  PageInfo page = 10;
}
