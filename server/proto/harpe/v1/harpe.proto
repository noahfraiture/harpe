syntax = "proto3";

package harpe.v1;

service GameService {
  rpc CreateGame(CreateGameRequest) returns (Game);
  rpc ListGames(ListGamesRequest) returns (ListGamesResponse);
  rpc GetGame(GetGameRequest) returns (Game);
}

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc GetSession(GetSessionRequest) returns (Session);
  rpc SendMessage(SendMessageRequest) returns (stream MessageDelta);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
}

service MemoryService {
  rpc GetStorySummary(GetStorySummaryRequest) returns (StorySummary);
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse);
  rpc GetCharacter(GetCharacterRequest) returns (Character);
  rpc SearchMemory(SearchMemoryRequest) returns (SearchMemoryResponse);
}

message Game {
  string id = 1;
  string title = 2;
  string system_prompt = 3;
  string created_at = 4;
}

message Session {
  string id = 1;
  string game_id = 2;
  string title = 3;
  string created_at = 4;
}

message Message {
  string id = 1;
  string session_id = 2;
  MessageRole role = 3;
  string content = 4;
  string created_at = 5;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_SYSTEM = 1;
  MESSAGE_ROLE_USER = 2;
  MESSAGE_ROLE_ASSISTANT = 3;
}

message StorySummary {
  string session_id = 1;
  string content = 2;
  string updated_at = 3;
}

message Character {
  string id = 1;
  string game_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  string updated_at = 6;
}

message MemoryHit {
  string id = 1;
  string session_id = 2;
  string kind = 3;
  string content = 4;
  float score = 5;
}

message CreateGameRequest {
  string title = 1;
  string system_prompt = 2;
}

message ListGamesRequest {
  uint32 limit = 1;
}

message ListGamesResponse {
  repeated Game games = 1;
}

message GetGameRequest {
  string game_id = 1;
}

message CreateSessionRequest {
  string game_id = 1;
  string title = 2;
}

message GetSessionRequest {
  string session_id = 1;
}

message SendMessageRequest {
  string session_id = 1;
  string content = 2;
}

message MessageDelta {
  string session_id = 1;
  string message_id = 2;
  string delta = 3;
  bool done = 4;
}

message ListMessagesRequest {
  string session_id = 1;
  uint32 limit = 2;
}

message ListMessagesResponse {
  repeated Message messages = 1;
}

message GetStorySummaryRequest {
  string session_id = 1;
}

message ListCharactersRequest {
  string game_id = 1;
}

message ListCharactersResponse {
  repeated Character characters = 1;
}

message GetCharacterRequest {
  string character_id = 1;
}

message SearchMemoryRequest {
  string session_id = 1;
  string query = 2;
  uint32 limit = 3;
}

message SearchMemoryResponse {
  repeated MemoryHit hits = 1;
}

