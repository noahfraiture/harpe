name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Rust backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Backend coverage
        run: cargo llvm-cov -p harpe-server --all-targets --locked --fail-under-lines 95

  persistent-surreal:
    name: Persistent SurrealDB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Start SurrealDB
        run: |
          docker run --detach --name harpe-surrealdb \
            --publish 8000:8000 \
            surrealdb/surrealdb:v3.0.5 \
            start --user root --pass root rocksdb:/tmp/harpe-ci.db
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs harpe-surrealdb
          exit 1

      - name: Run persistent SurrealDB test
        env:
          HARPE_PERSISTENT_SURREALDB_ENDPOINT: ws://127.0.0.1:8000
          HARPE_PERSISTENT_SURREALDB_USERNAME: root
          HARPE_PERSISTENT_SURREALDB_PASSWORD: root
        run: cargo test -p harpe-server --test persistent_surreal -- --ignored

  provider-conformance:
    name: Provider conformance
    runs-on: ubuntu-latest
    env:
      HARPE_PROVIDER_CONFORMANCE_BASE_URL: ${{ secrets.HARPE_PROVIDER_CONFORMANCE_BASE_URL }}
      HARPE_PROVIDER_CONFORMANCE_API_KEY: ${{ secrets.HARPE_PROVIDER_CONFORMANCE_API_KEY }}
      HARPE_PROVIDER_CONFORMANCE_CHAT_MODEL: ${{ secrets.HARPE_PROVIDER_CONFORMANCE_CHAT_MODEL }}
      HARPE_PROVIDER_CONFORMANCE_EXTRACTION_MODEL: ${{ secrets.HARPE_PROVIDER_CONFORMANCE_EXTRACTION_MODEL }}
      HARPE_PROVIDER_CONFORMANCE_EMBEDDING_MODEL: ${{ secrets.HARPE_PROVIDER_CONFORMANCE_EMBEDDING_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run provider conformance test
        if: env.HARPE_PROVIDER_CONFORMANCE_BASE_URL != '' && env.HARPE_PROVIDER_CONFORMANCE_CHAT_MODEL != '' && env.HARPE_PROVIDER_CONFORMANCE_EXTRACTION_MODEL != '' && env.HARPE_PROVIDER_CONFORMANCE_EMBEDDING_MODEL != ''
        run: cargo test -p harpe-server --test provider_conformance -- --ignored

      - name: Skip provider conformance test
        if: env.HARPE_PROVIDER_CONFORMANCE_BASE_URL == '' || env.HARPE_PROVIDER_CONFORMANCE_CHAT_MODEL == '' || env.HARPE_PROVIDER_CONFORMANCE_EXTRACTION_MODEL == '' || env.HARPE_PROVIDER_CONFORMANCE_EMBEDDING_MODEL == ''
        run: |
          echo "Skipping provider conformance test because HARPE_PROVIDER_CONFORMANCE_* secrets are not fully configured."

  publish-image:
    name: Publish image
    runs-on: ubuntu-24.04-arm
    needs:
      - backend
      - persistent-surreal
      - provider-conformance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=dev-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/noahfraiture/harpe:${{ steps.image.outputs.tag }}
