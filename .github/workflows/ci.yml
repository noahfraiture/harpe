name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Rust backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --workspace --all-targets --locked --fail-under-lines 95

  persistent-surreal:
    name: Persistent SurrealDB
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Start SurrealDB
        run: |
          docker run --detach --name harpe-surrealdb \
            --publish 8000:8000 \
            surrealdb/surrealdb:v3.0.5 \
            start --user root --pass root rocksdb:/tmp/harpe-ci.db
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs harpe-surrealdb
          exit 1

      - name: Run persistent SurrealDB test
        env:
          HARPE_PERSISTENT_SURREALDB_ENDPOINT: ws://127.0.0.1:8000
          HARPE_PERSISTENT_SURREALDB_USERNAME: root
          HARPE_PERSISTENT_SURREALDB_PASSWORD: root
        run: cargo test -p harpe-server --test persistent_surreal -- --ignored
